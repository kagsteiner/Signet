<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signet</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <button id="story-title-btn" class="story-title" aria-label="Open story panel"></button>
      <div id="save-indicator" class="save-indicator"></div>
    </header>

    <main id="manuscript">
      <div id="editor-container">
        <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Begin writing…"></div>
        <div id="recall-pulse" class="recall-pulse hidden" aria-hidden="true"></div>
        <div id="recall-overlay" class="recall-overlay hidden" aria-live="polite"></div>
        <div id="gem-container">
          <button id="gem" class="gem" aria-label="Continue writing">&#9671;</button>
        </div>
      </div>
    </main>

    <div id="story-panel-backdrop" class="story-panel-backdrop hidden" aria-hidden="true"></div>
    <div id="story-panel" class="story-panel hidden" role="dialog" aria-label="Story panel">
      <section class="story-panel-section story-panel-meta">
        <input id="story-title-input" type="text" placeholder="Title" autocomplete="off" spellcheck="false">
        <input id="story-author-input" type="text" placeholder="Author" autocomplete="off" spellcheck="false">
      </section>
      <section class="story-panel-section story-panel-intent">
        <div id="intent-for-note" class="intent-for-note hidden">
          <span class="intent-for-text">This story is the intent for “<span id="intent-for-title"></span>”.</span>
          <button id="intent-for-open" class="intent-reference-open" type="button">Open</button>
        </div>
        <label for="story-intent">Story Intent</label>
        <select id="intent-source-select" class="intent-source-select" aria-label="Story intent source">
          <option value="">Write directly</option>
        </select>
        <textarea id="story-intent" placeholder="Direction, planned chapters, notes…" rows="8"></textarea>
        <div id="intent-reference" class="intent-reference hidden">
          <span class="intent-reference-text">Using “<span id="intent-reference-title"></span>” as this story’s intent.</span>
          <button id="intent-reference-open" class="intent-reference-open" type="button">Open</button>
        </div>
      </section>
      <section id="story-panel-chapters" class="story-panel-section story-panel-chapters hidden"></section>
      <section class="story-panel-section story-panel-manage">
        <button id="manage-stories-link" class="story-panel-manage-link" type="button">Manage Stories…</button>
      </section>
    </div>

    <!-- Story switching overlay -->
    <div id="story-overlay" class="story-overlay hidden">
      <div class="story-overlay-inner">
        <h2>Stories</h2>
        <hr>
        <ul id="story-list"></ul>
        <div class="overlay-actions">
          <button id="new-story-btn">+ New Story</button>
          <button id="export-md-btn">Export as Markdown</button>
          <button id="export-txt-btn">Export as Plain Text</button>
        </div>
      </div>
    </div>

    <!-- Rewrite overlay -->
    <div id="rewrite-overlay" class="rewrite-overlay hidden">
      <div class="rewrite-inner">
        <div id="rewrite-selected" class="rewrite-selected"></div>
        <input id="rewrite-input" type="text" placeholder="Transform…" autocomplete="off">
        <div id="rewrite-preview" class="rewrite-preview hidden">
          <div id="rewrite-diff"></div>
          <div class="rewrite-actions">
            <button id="rewrite-accept">Accept</button>
            <button id="rewrite-reject">Reject</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Keyboard hint (shown once) -->
    <div id="gem-hint" class="gem-hint hidden">Tip: ⌘↩ continues anywhere.</div>
  </div>

  <script src="chapters.js"></script>
  <script src="app.js"></script>
</body>
</html>
